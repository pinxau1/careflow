<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CareFlow Display</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="/css/style.css" rel="stylesheet">
</head>
<body class="display-body">
  <main class="display-shell">
    <header class="display-header">
      <div>
        <div class="display-brand">CareFlow</div>
        <div class="display-subtitle">Now Serving</div>
      </div>
      <div class="display-updated" id="display-updated">Loading...</div>
    </header>

    <section class="display-grid" id="display-grid">
      <div class="empty-state">Loading display...</div>
    </section>
  </main>

  <script src="/js/display.js"></script>
</body>
</html>
